baseURL: "https://fringcat.github.io/"
title: "FringCat"
pagination:
  pagerSize: 5
theme: ["PaperMod"]

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

defaultContentLanguage: zh-cn

languages:
  zh-cn:
    label: "中文"
    locale: zh-cn
    weight: 1

outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableXML: true

params:
  env: production
  title: FringCat
  description: "记录生活与思考的个人博客"
  keywords: [Blog, 博客, 个人博客]
  author: FringCat
  DateFormat: "2006年1月2日"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "FringCat 👋"
    Content: >
      记录生活与思考的个人博客。安静书写，自然生长。

  socialIcons:
    - name: github
      url: "https://github.com/FringCat"

  assets:
    favicon: "/favicon.svg"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 25
    - identifier: about
      name: 关于
      url: /about/
      weight: 30
